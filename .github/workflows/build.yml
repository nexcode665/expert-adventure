name: ImmortalWrt-x86-1G-OpenClash-PassWall

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential cmake git libncurses5-dev python3

      - name: Clone ImmortalWrt 23.05
        run: |
          git clone -b v23.05 --single-branch --depth=1 https://github.com/immortalwrt/immortalwrt
          cd immortalwrt

      - name: Add OpenClash & PassWall feeds
        run: |
          cd immortalwrt
          echo "src-git openclash https://github.com/vernesong/OpenClash.git" >> feeds.conf.default
          echo "src-git passwall https://github.com/xiaorouji/openwrt-passwall.git" >> feeds.conf.default
          echo "src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git" >> feeds.conf.default

      - name: Update & Install feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 1GB内存精简配置 + OpenClash + PassWall
        run: |
          cd immortalwrt
          cat > .config << EOF
  CONFIG_TARGET_x86=y
  CONFIG_TARGET_x86_64=y
  CONFIG_TARGET_x86_64_DEVICE_generic=y
  CONFIG_TARGET_ROOTFS_PARTSIZE=512
  # 基础
  CONFIG_PACKAGE_luci=y
  CONFIG_PACKAGE_luci-theme-bootstrap=y
  # 科学插件
  CONFIG_PACKAGE_luci-app-openclash=y
  CONFIG_PACKAGE_luci-app-passwall=y
  # 关闭多余组件，适配1G内存
  CONFIG_PER_FEED_CONF=y
  # CONFIG_KERNEL_DEBUG_INFO is not set
  # CONFIG_KERNEL_DEBUG_INFO_BTF is not set
  # CONFIG_KERNEL_PROFILING is not set
  CONFIG_SIGNED_PACKAGES=n
  # 虚拟机镜像格式
  CONFIG_VMDK_IMAGES=y
  CONFIG_QCOW2_IMAGES=y
  CONFIG_ISO_IMAGES=y
EOF
          make defconfig

      - name: Download Libraries
        run: |
          cd immortalwrt
          make download -j$(nproc)

      - name: Build
        run: |
          cd immortalwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86-1g-openclash-passwall
          path: immortalwrt/bin/targets/x86/*/*
