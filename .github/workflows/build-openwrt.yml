name: Lean_x86_64_旁路由_爱快专用

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装编译环境
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libncurses5-dev libncursesw5-dev git wget curl ccache

      - name: 拉取 Lean 源码
        run: |
          # 定义克隆重试函数，应对Runner临时网络波动
          retry_clone() {
            local url=$1
            local dir=$2
            for i in 1 2 3; do
              echo "尝试克隆仓库: $url (第$i次)"
              if git clone --depth 1 "$url" "$dir"; then
                echo "✅ 克隆成功"
                return 0
              fi
              echo "❌ 克隆失败，等待5秒后重试"
              sleep 5
            done
            echo "❌ 克隆失败，已重试3次"
            return 1
          }

          # 清理残留目录，避免重复克隆报错
          rm -rf openwrt
          # 海外Runner直连GitHub原生地址，无需代理
          retry_clone https://github.com/coolsnowwolf/lede.git openwrt
          
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 安装 PassWall + OpenClash
        run: |
          retry_clone() {
            local url=$1
            local dir=$2
            for i in 1 2 3; do
              echo "尝试克隆插件: $url (第$i次)"
              if git clone --depth 1 "$url" "$dir"; then
                echo "✅ 克隆成功"
                return 0
              fi
              echo "❌ 克隆失败，等待5秒后重试"
              sleep 5
            done
            echo "❌ 克隆失败，已重试3次"
            return 1
          }

          cd openwrt/package
          # 清理残留目录
          rm -rf OpenClash passwall_pkg passwall
          
          # 直连原生GitHub地址
          retry_clone https://github.com/vernesong/OpenClash.git OpenClash
          retry_clone https://github.com/xiaorouji/openwrt-passwall-packages.git passwall_pkg
          retry_clone https://github.com/xiaorouji/openwrt-passwall.git passwall
          
          cd ..
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 写入旁路由固定IP 192.168.9.23
        env:
          OPENWRT_CONFIG: |
            CONFIG_TARGET_x86=y
            CONFIG_TARGET_x86_64=y
            CONFIG_TARGET_x86_64_DEVICE_generic=y

            # 镜像格式
            CONFIG_TARGET_ROOTFS_EXT4=y
            CONFIG_TARGET_ROOTFS_SQUASHFS=y
            CONFIG_TARGET_IMAGES_GZIP=y
            CONFIG_VMDK_IMAGES=y

            # 旁路由必备插件
            CONFIG_PACKAGE_luci-app-openclash=y
            CONFIG_PACKAGE_luci-app-passwall=y
            CONFIG_PACKAGE_luci-app-passwall2=y

            # 基础工具
            CONFIG_PACKAGE_luci-app-ttyd=y
            CONFIG_PACKAGE_luci-app-autoreboot=y
            CONFIG_PACKAGE_dnsmasq-full=y
            CONFIG_PACKAGE_ipv6helper=y
            CONFIG_PACKAGE_htop=y
        run: |
          cd openwrt
          rm -f .config
          echo "$OPENWRT_CONFIG" > .config
          
          # 设置固定IP 192.168.9.23 + 关闭DHCP
          sed -i 's/192.168.1.1/192.168.9.23/g' package/base-files/files/bin/config_generate
          sed -i 's/192.168.1.255/192.168.9.255/g' package/base-files/files/bin/config_generate
          sed -i '/dhcp.lan.ignore/d' package/base-files/files/bin/config_generate
          echo "uci set dhcp.lan.ignore=1" >> package/base-files/files/bin/config_generate
          echo "uci set network.lan.gateway='192.168.9.1'" >> package/base-files/files/bin/config_generate
          echo "uci set network.lan.dns='192.168.9.1'" >> package/base-files/files/bin/config_generate
          echo "uci commit network" >> package/base-files/files/bin/config_generate
          echo "uci commit dhcp" >> package/base-files/files/bin/config_generate

      - name: 下载依赖
        run: |
          cd openwrt
          make defconfig
          make download -j8

      - name: 开始编译
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-Lean-x86_64-旁路由-192.168.9.23
          path: openwrt/bin/targets/x86/64/*combined*.gz
